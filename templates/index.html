<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jiyong 게시판</title>
    <style>
        /* 전체 페이지 기본 스타일 (다른 페이지들과 통일) */
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            color: #333;
        }
        .container { 
            max-width: 800px; /* 표가 들어가므로 다른 페이지(600px)보다 약간 넓게 설정 */
            margin: 0 auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* 헤더 영역 (제목과 작성 버튼을 양끝으로 배치) */
        .page-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }
        .page-title { 
            font-size: 24px; 
            font-weight: bold; 
            margin: 0; 
        }

        /* 버튼 스타일 */
        .btn { 
            padding: 8px 16px; 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 14px; 
            cursor: pointer; 
            border: none;
            display: inline-block;
            text-align: center;
            transition: opacity 0.3s;
        }
        .btn-write { background-color: #007bff; color: white; font-weight: bold; }
        .btn:hover { opacity: 0.9; }

        /* 테이블 기본 스타일 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            padding: 12px 10px; 
            text-align: center; 
            border-bottom: 1px solid #ddd; 
        }
        
        /* 테이블 헤더(th) 디자인 */
        th { 
            background-color: #f8f9fa; 
            font-weight: bold; 
            color: #444;
            border-top: 2px solid #333; /* 상단에 진한 라인을 그어 게시판 느낌 강조 */
        }
        
        /* 마우스 오버 시 행 배경색 변경 효과 */
        tbody tr:hover { background-color: #f9f9f9; }
        
        /* 각 열의 너비 및 제목 정렬 */
        .col-id { width: 10%; }
        .col-title { width: 50%; text-align: left; padding-left: 20px; }
        .col-author { width: 20%; }
        .col-date { width: 20%; }

        /* 제목 링크 스타일 */
        .col-title a {
            text-decoration: none;
            color: #333;
        }
        .col-title a:hover {
            text-decoration: underline;
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 영역 -->
        <header class="page-header">
            <h1 class="page-title">jiyong 게시판</h1>
            <a href="/write" class="btn btn-write">글 작성하기</a>
        </header>
        
        <!-- 게시판 목록 영역 -->
        <main>
            <table>
                <thead>
                    <tr>
                        <th class="col-id">번호</th>
                        <th class="col-title">제목</th>
                        <th class="col-author">작성자</th>
                        <th class="col-date">작성일</th>
                    </tr>
                </thead>
                <tbody>
                    {% for post in posts %}
                    <tr>
                        <td>{{ post.id }}</td>
                        <td class="col-title">
                            <!-- 링크를 제목 열로 이동시켰습니다 -->
                            <a href="/post/{{ post.id }}">{{ post.title }}</a>
                        </td>
                        <td>{{ post.author }}</td>
                        <td>{{ post.date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </main>
    </div>
</body>
</html>
