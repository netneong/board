<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시판 - 글쓰기</title>
    <style>
        /* 간단한 레이아웃 스타일 */
        .write-container { max-width: 600px; margin: 20px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-area { text-align: right; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>나의 웹 게시판</h1>
    </header>

    <main>
        <section class="write-container">
            <h2>새 글 작성하기</h2>
            
            <form action="/write" method="POST">
                
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="author">작성자</label>
                    <input type="text" id="author" name="author" placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" name="content" rows="10" placeholder="내용을 자유롭게 작성하세요" required></textarea>
                </div>

                <div class="btn-area">
                    <a href="index.html"><button type="button">취소</button></a>
                    <button type="submit">등록하기</button>
                </div>

            </form>
        </section>
    </main>

    <footer>
        
    </footer>

</body>
</html>
