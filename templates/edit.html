<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 수정</title>
    <style>
        /* detail.html과 통일감을 주기 위한 기본 스타일 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* 페이지 헤더 영역 */
        .page-header { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .page-title { font-size: 24px; font-weight: bold; margin: 0; color: #333; }

        /* 폼 입력 요소 스타일 */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* 패딩이 너비에 포함되도록 설정 */
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.3s; /* 포커스 시 부드러운 전환 효과 */
        }
        
        /* 입력창 클릭(포커스) 시 테두리 색상 변경 */
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        
        /* 내용 입력창 크기 설정 */
        textarea {
            min-height: 250px; /* detail.html의 본문 영역과 비슷한 높이로 설정 */
            resize: vertical;  /* 세로로만 크기 조절 가능하게 설정 */
            line-height: 1.6;
        }

        /* 하단 버튼 영역 */
        .button-group { 
            margin-top: 30px; 
            padding-top: 15px; 
            border-top: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
        }
        
        .btn { 
            padding: 8px 16px; 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 14px; 
            cursor: pointer; 
            border: none;
            display: inline-block;
            text-align: center;
        }
        
        /* 버튼 색상 (detail.html과 동일한 톤 사용) */
        .btn-cancel { background-color: #6c757d; color: white; }
        .btn-submit { background-color: #007bff; color: white; }
        
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1 class="page-title">글 수정</h1>
    </div>

    <form action="{{ url_for('edit', post_id=post['id']) }}" method="POST">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" value="{{ post['title'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" name="content" required>{{ post['content'] }}</textarea>
        </div>
        
        <div class="button-group">
            <a href="{{ url_for('detail', post_id=post['id']) }}" class="btn btn-cancel">취소</a>
            <button type="submit" class="btn btn-submit">수정 완료</button>
        </div>
    </form>
</div>

</body>
</html>
